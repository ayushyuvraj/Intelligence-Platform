version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: regradar-backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: sqlite:///./regradar.db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BACKEND_URL: http://backend:8000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./regradar/backend/src:/app/src
      - ./regradar.db:/app/regradar.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - regradar
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: regradar-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - regradar
    restart: unless-stopped

networks:
  regradar:
    driver: bridge

volumes:
  regradar_db:
    driver: local
